name: Swift Tests

on:
  push:
    paths:
      - 'swift/**'
      - 'scripts/test-swift-package.sh'
      - '.github/workflows/swift-tests.yml'
  pull_request:
    paths:
      - 'swift/**'
      - 'scripts/test-swift-package.sh'
      - '.github/workflows/swift-tests.yml'

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: ./scripts/test-swift-package.sh
